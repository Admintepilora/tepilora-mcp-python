name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
      - "test-v*"

permissions:
  contents: read

jobs:
  lane-ancestry-gate:
    name: Lane ancestry gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      target_sha: ${{ steps.lane.outputs.target_sha }}
      package_index: ${{ steps.lane.outputs.package_index }}
      publish_environment: ${{ steps.lane.outputs.publish_environment }}
      expected_branch: ${{ steps.lane.outputs.expected_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish lane and verify ancestry
        id: lane
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "::error::Publish workflow must run from a tag ref."
            exit 1
          fi

          TAG_NAME="${GITHUB_REF_NAME:?missing GITHUB_REF_NAME}"
          PUBLIC_DEFAULT_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [[ -z "${PUBLIC_DEFAULT_BRANCH}" ]]; then
            echo "::error::Unable to resolve public default branch."
            exit 1
          fi

          case "${TAG_NAME}" in
            test-v*)
              PACKAGE_INDEX="testpypi"
              PUBLISH_ENVIRONMENT="testpypi-preprod"
              EXPECTED_BRANCH="pre-prod"
              ;;
            v*)
              PACKAGE_INDEX="pypi"
              PUBLISH_ENVIRONMENT="pypi-prod"
              EXPECTED_BRANCH="${PUBLIC_DEFAULT_BRANCH}"
              ;;
            *)
              echo "::error::Unsupported tag '${TAG_NAME}'. Expected v* or test-v*."
              exit 1
              ;;
          esac

          if ! TARGET_SHA="$(git rev-list -n 1 "refs/tags/${TAG_NAME}")"; then
            echo "::error::Unable to resolve tag '${TAG_NAME}' to a commit."
            exit 1
          fi
          if [[ -z "${TARGET_SHA}" ]]; then
            echo "::error::Tag '${TAG_NAME}' resolved to an empty SHA."
            exit 1
          fi

          git fetch origin "${EXPECTED_BRANCH}"
          EXPECTED_REF="origin/${EXPECTED_BRANCH}"
          if ! git rev-parse --verify "${EXPECTED_REF}^{commit}" >/dev/null; then
            echo "::error::Expected branch '${EXPECTED_REF}' is unavailable after fetch."
            exit 1
          fi
          if ! git merge-base --is-ancestor "${TARGET_SHA}" "${EXPECTED_REF}"; then
            echo "::error::Tag '${TAG_NAME}' is not an ancestor of ${EXPECTED_REF}; publish refused."
            exit 1
          fi

          {
            echo "target_sha=${TARGET_SHA}"
            echo "package_index=${PACKAGE_INDEX}"
            echo "publish_environment=${PUBLISH_ENVIRONMENT}"
            echo "expected_branch=${EXPECTED_BRANCH}"
          } >> "${GITHUB_OUTPUT}"

  gate-ci-status:
    name: Gate CI status
    needs: lane-ancestry-gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require successful CI on target SHA
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.lane-ancestry-gate.outputs.target_sha }}
          CI_TIMEOUT_SECONDS: "900"
          CI_POLL_SECONDS: "15"
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          target_sha = os.environ["TARGET_SHA"]
          repository = os.environ["GITHUB_REPOSITORY"]
          timeout_seconds = int(os.environ.get("CI_TIMEOUT_SECONDS", "900"))
          poll_seconds = int(os.environ.get("CI_POLL_SECONDS", "15"))
          endpoint = (
              f"/repos/{repository}/actions/runs"
              f"?head_sha={target_sha}&per_page=100"
          )
          deadline = time.monotonic() + timeout_seconds

          def workflow_path(run):
              raw_path = run.get("path") or run.get("workflow_path") or ""
              return raw_path.split("@", 1)[0]

          def is_ci_run(run):
              return workflow_path(run) == ".github/workflows/ci.yml" or run.get("name") == "CI"

          def newest_key(run):
              return run.get("run_started_at") or run.get("created_at") or ""

          while True:
              result = subprocess.run(
                  [
                      "gh",
                      "api",
                      "-H",
                      "Accept: application/vnd.github+json",
                      endpoint,
                  ],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  message = result.stderr.strip() or result.stdout.strip()
                  print(f"BLOCKED: unable to query CI runs for {target_sha}.")
                  print(f"Endpoint: {endpoint}")
                  if message:
                      print(message)
                  sys.exit(result.returncode)

              payload = json.loads(result.stdout)
              ci_runs = [
                  run for run in payload.get("workflow_runs", [])
                  if is_ci_run(run)
              ]

              if ci_runs:
                  ci_runs.sort(key=newest_key, reverse=True)
                  run = ci_runs[0]
                  status = run.get("status") or "unknown"
                  conclusion = run.get("conclusion")
                  run_url = run.get("html_url", "")
                  run_label = f"{workflow_path(run) or run.get('name') or 'CI'}"

                  if status == "completed":
                      if conclusion == "success":
                          print(f"CI workflow on {target_sha} is success. Publish allowed.")
                          print(f"Workflow: {run_label}")
                          print(f"Run: {run_url}")
                          sys.exit(0)

                      print(f"BLOCKED: CI workflow on {target_sha} completed with {conclusion or 'no conclusion'}.")
                      print(f"Workflow: {run_label}")
                      print(f"Run: {run_url}")
                      sys.exit(1)

                  print(f"Waiting for CI workflow on {target_sha}: status={status}.")
                  print(f"Workflow: {run_label}")
                  print(f"Run: {run_url}")
              else:
                  print(f"Waiting for CI workflow on {target_sha}: no matching run yet.")
                  print(f"Endpoint: {endpoint}")

              if time.monotonic() >= deadline:
                  print(f"BLOCKED: timed out waiting for CI workflow on {target_sha}.")
                  print(f"Endpoint: {endpoint}")
                  sys.exit(1)

              time.sleep(poll_seconds)
          PY

  build:
    needs:
      - lane-ancestry-gate
      - gate-ci-status
    if: github.repository == 'Admintepilora/tepilora-mcp-python'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pip install build

      - name: Tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/ -v --tb=short

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs:
      - lane-ancestry-gate
      - build
    if: github.repository == 'Admintepilora/tepilora-mcp-python' && needs.lane-ancestry-gate.outputs.package_index == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi-preprod
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs:
      - lane-ancestry-gate
      - build
    if: github.repository == 'Admintepilora/tepilora-mcp-python' && needs.lane-ancestry-gate.outputs.package_index == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi-prod
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
