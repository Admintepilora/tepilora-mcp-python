name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
      - "test-v*"

permissions:
  contents: read

jobs:
  lane-ancestry-gate:
    name: Lane ancestry gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      target_sha: ${{ steps.lane.outputs.target_sha }}
      package_index: ${{ steps.lane.outputs.package_index }}
      publish_environment: ${{ steps.lane.outputs.publish_environment }}
      expected_branch: ${{ steps.lane.outputs.expected_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish lane and verify ancestry
        id: lane
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "::error::Publish workflow must run from a tag ref."
            exit 1
          fi

          TAG_NAME="${GITHUB_REF_NAME:?missing GITHUB_REF_NAME}"
          PUBLIC_DEFAULT_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [[ -z "${PUBLIC_DEFAULT_BRANCH}" ]]; then
            echo "::error::Unable to resolve public default branch."
            exit 1
          fi

          case "${TAG_NAME}" in
            test-v*)
              PACKAGE_INDEX="testpypi"
              PUBLISH_ENVIRONMENT="testpypi-preprod"
              EXPECTED_BRANCH="pre-prod"
              ;;
            v*)
              PACKAGE_INDEX="pypi"
              PUBLISH_ENVIRONMENT="pypi-prod"
              EXPECTED_BRANCH="${PUBLIC_DEFAULT_BRANCH}"
              ;;
            *)
              echo "::error::Unsupported tag '${TAG_NAME}'. Expected v* or test-v*."
              exit 1
              ;;
          esac

          if ! TARGET_SHA="$(git rev-list -n 1 "refs/tags/${TAG_NAME}")"; then
            echo "::error::Unable to resolve tag '${TAG_NAME}' to a commit."
            exit 1
          fi
          if [[ -z "${TARGET_SHA}" ]]; then
            echo "::error::Tag '${TAG_NAME}' resolved to an empty SHA."
            exit 1
          fi

          git fetch origin "${EXPECTED_BRANCH}"
          EXPECTED_REF="origin/${EXPECTED_BRANCH}"
          if ! git rev-parse --verify "${EXPECTED_REF}^{commit}" >/dev/null; then
            echo "::error::Expected branch '${EXPECTED_REF}' is unavailable after fetch."
            exit 1
          fi
          if ! git merge-base --is-ancestor "${TARGET_SHA}" "${EXPECTED_REF}"; then
            echo "::error::Tag '${TAG_NAME}' is not an ancestor of ${EXPECTED_REF}; publish refused."
            exit 1
          fi

          {
            echo "target_sha=${TARGET_SHA}"
            echo "package_index=${PACKAGE_INDEX}"
            echo "publish_environment=${PUBLISH_ENVIRONMENT}"
            echo "expected_branch=${EXPECTED_BRANCH}"
          } >> "${GITHUB_OUTPUT}"

  gate-ci-status:
    name: Gate CI status
    needs: lane-ancestry-gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require successful CI on target SHA
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.lane-ancestry-gate.outputs.target_sha }}
          CI_WORKFLOW_ID: "ci.yml"
        shell: bash
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/${CI_WORKFLOW_ID}/runs?head_sha=${TARGET_SHA}&per_page=20" \
            > /tmp/ci-runs.json

          python3 - <<'PY'
          import json
          import os
          import sys

          target_sha = os.environ["TARGET_SHA"]
          workflow_id = os.environ["CI_WORKFLOW_ID"]

          with open("/tmp/ci-runs.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          runs = payload.get("workflow_runs", [])
          if not runs:
              print(f"BLOCKED: CI workflow on {target_sha} is missing. Publish refused.")
              print(f"Workflow: CI ({workflow_id})")
              sys.exit(1)

          run = runs[0]
          run_status = run.get("status") or "unknown"
          conclusion = run.get("conclusion")
          status = conclusion if run_status == "completed" else run_status
          run_url = run.get("html_url", "")

          if status == "success":
              print(f"CI workflow on {target_sha} is success. Publish allowed.")
              print(f"Workflow: CI ({workflow_id})")
              print(f"Run: {run_url}")
              sys.exit(0)

          print(f"BLOCKED: CI workflow on {target_sha} is {status}. Publish refused.")
          print(f"Workflow: CI ({workflow_id})")
          print(f"Run: {run_url}")
          sys.exit(1)
          PY

  build:
    needs:
      - lane-ancestry-gate
      - gate-ci-status
    if: github.repository == 'Admintepilora/tepilora-mcp-python'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pip install build

      - name: Tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/ -v --tb=short

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs:
      - lane-ancestry-gate
      - build
    if: needs.lane-ancestry-gate.outputs.package_index == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi-preprod
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs:
      - lane-ancestry-gate
      - build
    if: needs.lane-ancestry-gate.outputs.package_index == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi-prod
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
